<section id="tab-practice" class="tab-content hidden animate-in fade-in slide-in-from-bottom-4 pb-10">
    <div class="flex items-center justify-between mb-8">
        <div>
            <h2 class="text-3xl font-black text-slate-800 dark:text-white tracking-tight">Luyện tập ✍️</h2>
            <p class="text-[10px] font-bold text-slate-400 uppercase mt-1 tracking-widest">Kiểm tra trí nhớ của bạn</p>
        </div>
        <div id="quiz-timer" class="hidden bg-blue-50 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400 text-sm font-black px-4 py-2 rounded-2xl border border-blue-100 dark:border-blue-800/50 shadow-sm flex items-center gap-2 transition-colors duration-300">
            <span class="animate-pulse">⏱️</span> <span id="timer-text">00:00</span>
        </div>
    </div>

    <div id="quiz-container" class="max-w-2xl mx-auto">
        
        <div id="quiz-setup" class="bg-white dark:bg-slate-800 p-6 md:p-8 rounded-[2rem] border border-slate-100 dark:border-slate-700 shadow-sm space-y-8">
            
            <div class="space-y-3">
                <label class="text-[10px] font-black text-slate-500 dark:text-slate-400 uppercase tracking-widest pl-1">Chế độ học</label>
                <div class="grid grid-cols-2 gap-3">
                    <button data-action="set-quiz-mode" data-payload="learning" class="q-mode-btn p-4 rounded-2xl border-2 border-blue-500 bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 font-black transition-all flex flex-col items-center gap-2">
                        <span class="text-2xl">📖</span>
                        <span class="text-xs uppercase tracking-widest">Học tập</span>
                        <span class="text-[9px] font-medium text-blue-500/70 dark:text-blue-400/70 normal-case">Có giải thích chi tiết</span>
                    </button>
                    <button data-action="set-quiz-mode" data-payload="exam" class="q-mode-btn p-4 rounded-2xl border-2 border-slate-100 dark:border-slate-700 text-slate-400 font-bold hover:border-slate-200 dark:hover:border-slate-600 transition-all flex flex-col items-center gap-2">
                        <span class="text-2xl">⏱️</span>
                        <span class="text-xs uppercase tracking-widest">Thi thử</span>
                        <span class="text-[9px] font-medium opacity-70 normal-case">10s cho mỗi câu hỏi</span>
                    </button>
                </div>
            </div>

            <div class="space-y-4">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 dark:text-slate-400 uppercase tracking-widest pl-1">Chủ đề cần ôn</label>
                    <select id="quiz-topic-select" class="w-full p-4 bg-slate-50 dark:bg-slate-900 dark:text-white rounded-2xl font-bold outline-none border border-slate-200 dark:border-slate-700 focus:border-blue-500 transition-colors cursor-pointer text-sm"></select>
                </div>
                
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 dark:text-slate-400 uppercase tracking-widest pl-1">Số lượng câu hỏi</label>
                    <div class="flex gap-2 bg-slate-50 dark:bg-slate-900 p-1.5 rounded-2xl border border-slate-200 dark:border-slate-700">
                        <button data-action="set-quiz-count" data-payload="10" class="q-count-btn flex-1 py-3 rounded-xl font-black text-xs transition-all text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200">10</button>
                        <button data-action="set-quiz-count" data-payload="20" class="q-count-btn flex-1 py-3 rounded-xl font-black text-xs transition-all bg-white dark:bg-slate-700 text-blue-600 dark:text-blue-400 shadow-sm border border-slate-100 dark:border-slate-600">20</button>
                        <button data-action="set-quiz-count" data-payload="50" class="q-count-btn flex-1 py-3 rounded-xl font-black text-xs transition-all text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200">40</button>
                    </div>
                </div>
            </div>

            <button data-action="init-quiz" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-blue-500/30 hover:shadow-blue-500/50 hover:-translate-y-0.5 active:translate-y-0 transition-all uppercase text-xs tracking-widest flex items-center justify-center gap-2 mt-4">
                Bắt đầu ngay 🚀
            </button>
        </div>

        <div id="quiz-active" class="hidden space-y-6 animate-in fade-in zoom-in-95 duration-300">
            <div class="space-y-2">
                <div class="flex justify-between items-center px-1">
                    <button data-action="exit-quiz" class="text-[10px] font-black text-red-500 hover:text-red-600 uppercase tracking-widest flex items-center gap-1.5 bg-red-50 hover:bg-red-100 dark:bg-red-900/20 dark:hover:bg-red-900/40 px-2.5 py-1 rounded-lg transition-all active:scale-95">
                        <span>✕</span> Thoát ngang
                    </button>
                    <span id="quiz-progress-text" class="text-[10px] font-black text-blue-500 bg-blue-50 dark:bg-blue-900/20 px-2 py-1 rounded-lg">0/0</span>
                </div>
                <div class="w-full bg-slate-100 dark:bg-slate-700/50 h-2.5 rounded-full overflow-hidden border border-slate-200 dark:border-slate-700">
                    <div id="quiz-progress-bar" class="bg-gradient-to-r from-blue-400 to-indigo-500 h-full transition-all duration-300 w-0"></div>
                </div>
            </div>

            <div class="bg-white dark:bg-slate-800 p-8 md:p-12 rounded-[2rem] border border-slate-100 dark:border-slate-700 shadow-sm text-center relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-blue-400/10 rounded-full blur-3xl -mr-10 -mt-10"></div>
                <h3 id="quiz-q-word" class="text-4xl md:text-5xl font-black text-slate-800 dark:text-white mb-4 tracking-tight relative z-10">---</h3>
                <div class="flex items-center justify-center gap-2 relative z-10">
                    <span id="quiz-q-ipa" class="text-blue-500 font-mono text-sm font-bold bg-blue-50 dark:bg-blue-900/20 px-3 py-1 rounded-lg">/---/</span>
                    <span id="quiz-q-type" class="text-[10px] font-black text-slate-500 bg-slate-100 dark:bg-slate-700 px-3 py-1 rounded-lg uppercase tracking-widest border border-slate-200 dark:border-slate-600">Type</span>
                </div>
            </div>

            <div id="quiz-q-options" class="grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-4"></div>

            <div id="quiz-explanation" class="hidden animate-in slide-in-from-bottom-5">
                <div class="bg-slate-900 dark:bg-slate-800 p-6 rounded-[2rem] border-2 border-emerald-500 shadow-xl shadow-emerald-500/10 text-white relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-24 h-24 bg-emerald-500/20 rounded-full blur-2xl"></div>
                    
                    <div class="flex justify-between items-start mb-4 relative z-10">
                        <div>
                            <p class="text-[10px] font-black text-emerald-400 uppercase tracking-widest mb-1">ĐÁP ÁN ĐÚNG ✅</p>
                            <p id="explain-mean" class="text-xl font-black text-white"></p>
                        </div>
                        <button data-action="speak-quiz-explain" class="p-3 bg-white/10 hover:bg-white/20 rounded-xl transition-colors backdrop-blur-sm">🔊</button>
                    </div>
                    
                    <div class="space-y-4 text-sm relative z-10">
                        <div class="bg-white/5 p-4 rounded-xl border border-white/10">
                            <p class="text-slate-300 italic text-sm" id="explain-example"></p>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-3">
                            <div class="p-3 bg-emerald-500/10 rounded-xl border border-emerald-500/20">
                                <span class="block text-[9px] font-black text-emerald-400 uppercase tracking-widest mb-1">Đồng nghĩa</span> 
                                <span id="explain-synonyms" class="font-bold text-xs"></span>
                            </div>
                            <div class="p-3 bg-red-500/10 rounded-xl border border-red-500/20">
                                <span class="block text-[9px] font-black text-red-400 uppercase tracking-widest mb-1">Trái nghĩa</span> 
                                <span id="explain-antonyms" class="font-bold text-xs"></span>
                            </div>
                        </div>
                        
                        <div id="explain-note-box" class="p-3 bg-amber-500/10 rounded-xl border border-amber-500/20">
                            <p class="text-[9px] font-black text-amber-400 uppercase tracking-widest mb-1">💡 Ghi chú</p>
                            <p id="explain-note" class="text-xs text-amber-100 font-medium"></p>
                        </div>
                    </div>
                    
                    <button data-action="next-quiz-question" class="w-full mt-6 bg-emerald-500 hover:bg-emerald-600 text-white py-4 rounded-xl font-black shadow-lg shadow-emerald-500/20 transition-all uppercase text-xs tracking-widest relative z-10">TIẾP TỤC ➔</button>
                </div>
            </div>
        </div>

        <div id="quiz-result" class="hidden bg-white dark:bg-slate-800 p-8 rounded-[2rem] border border-slate-100 dark:border-slate-700 shadow-sm text-center space-y-6 animate-in zoom-in duration-500">
            <div id="result-emoji" class="text-6xl animate-bounce">🏆</div>
            <div>
                <h3 class="text-3xl font-black text-slate-800 dark:text-white tracking-tight">Hoàn thành!</h3>
                <p id="result-summary" class="text-slate-500 font-bold mt-1 text-sm uppercase tracking-widest"></p>
            </div>
            
            <div class="p-6 bg-blue-50 dark:bg-blue-900/20 rounded-3xl border border-blue-100 dark:border-blue-800/50 inline-block min-w-[200px]">
                <p class="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-2">Điểm số của bạn</p>
                <div class="flex items-baseline justify-center gap-1">
                    <p id="result-score" class="text-6xl font-black text-blue-600 dark:text-blue-400 leading-none">0</p>
                    <span class="text-blue-400 font-bold text-xl">%</span>
                </div>
            </div>

            <div id="wrong-answers-container" class="hidden text-left border-t border-slate-100 dark:border-slate-700 pt-6 mt-6">
                <p class="text-[10px] font-black text-red-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-red-500"></span> Phân tích câu sai
                </p>
                <div id="wrong-answers-list" class="space-y-3 max-h-[40vh] overflow-y-auto pr-2 custom-scrollbar"></div>
            </div>

            <button onclick="location.reload();" class="w-full bg-slate-900 dark:bg-white dark:text-slate-900 text-white py-4 rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-slate-800 transition-colors shadow-lg">
                ↻ LÀM ĐỀ KHÁC
            </button>
        </div>
    </div>
</section>

<section id="tab-library" class="tab-content hidden">
    <div class="mb-6 sticky top-0 bg-slate-50/80 dark:bg-slate-950/80 backdrop-blur-xl z-20 pt-2 pb-4" id="library-header-section">
        <div class="flex items-center justify-between mb-4">
            <div>
                <h2 class="text-3xl font-black text-slate-800 dark:text-white tracking-tight">Thư viện 📚</h2>
                <p class="text-[10px] font-bold text-slate-400 uppercase mt-1">Quản lý không gian học tập</p>
            </div>
        </div>

        <div class="flex bg-slate-200/50 dark:bg-slate-800/80 p-1 rounded-2xl backdrop-blur-sm border border-slate-200 dark:border-slate-700/50">
            <button onclick="switchLibView('topics')" id="btn-view-topics"
                class="flex-1 py-3 rounded-xl text-[11px] font-black uppercase transition-all bg-white dark:bg-slate-700 text-blue-600 shadow-sm tracking-widest">
                📁 Chủ đề
            </button>
            <button onclick="switchLibView('notebook')" id="btn-view-notebook"
                class="flex-1 py-3 rounded-xl text-[11px] font-black text-slate-500 dark:text-slate-400 uppercase transition-all hover:text-slate-700 dark:hover:text-slate-200 tracking-widest bg-transparent shadow-none">
                📓 Sổ tay từ vựng
            </button>
        </div>
    </div>

    <div id="library-topics-view" class="grid grid-cols-2 md:grid-cols-3 gap-4 lg:gap-6 pb-10"></div>

    <div id="library-notebook-view" class="hidden space-y-6 pb-10 animate-in fade-in slide-in-from-bottom-4">
        
        <div class="flex flex-col md:flex-row gap-3">
            <div class="flex-1 flex items-center gap-3 bg-white dark:bg-slate-800 p-2 rounded-2xl border border-slate-100 dark:border-slate-700 shadow-sm focus-within:border-blue-500 focus-within:ring-4 focus-within:ring-blue-500/10 transition-all">
                <div class="w-10 h-10 bg-slate-50 dark:bg-slate-900 rounded-xl flex items-center justify-center text-slate-400 text-lg">🔍</div>
                <input type="text" id="library-search" oninput="handleSearchInput()" placeholder="Tìm từ vựng, nghĩa, ví dụ..."
                    class="bg-transparent border-none outline-none text-sm p-1 w-full font-bold text-slate-700 dark:text-white placeholder:text-slate-300 dark:placeholder:text-slate-600">
            </div>
            
            <select id="library-filter" onchange="renderVocabList(true)"
                class="bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 outline-none text-xs font-black p-4 rounded-2xl uppercase text-slate-600 dark:text-slate-300 cursor-pointer shadow-sm focus:border-blue-500 transition-all min-w-[150px]">
                <option value="all">🌐 Tất cả từ</option>
                <option value="n">📦 Danh từ (n)</option>
                <option value="v">⚡ Động từ (v)</option>
                <option value="adj">✨ Tính từ (adj)</option>
                <option value="adv">🚀 Trạng từ (adv)</option>
            </select>
        </div>

        <div id="vocab-container" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>
</section>

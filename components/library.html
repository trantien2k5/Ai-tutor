<section id="tab-library" class="tab-content hidden">
    <div class="mb-6" id="library-header-section">
        <div class="mb-4">
            <h2 class="text-2xl font-black text-slate-800 dark:text-white tracking-tight">Thư viện 📚</h2>
            <p class="text-[10px] font-bold text-slate-400 uppercase mt-1">Quản lý từ vựng & chủ đề</p>
        </div>

        <div class="flex bg-slate-100 dark:bg-slate-800/50 p-1 rounded-2xl">
            <button onclick="switchLibView('topics')" id="btn-view-topics" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase transition-all bg-white dark:bg-slate-700 text-blue-600 shadow-sm tracking-widest">Chủ đề 📂</button>
            <button onclick="switchLibView('notebook')" id="btn-view-notebook" class="flex-1 py-3 rounded-xl text-[10px] font-black text-slate-400 uppercase transition-all hover:text-slate-600 dark:hover:text-slate-300 tracking-widest">Sổ tay 📓</button>
        </div>
    </div>

    <div id="library-topics-view" class="grid grid-cols-2 gap-4"></div>

    <div id="library-notebook-view" class="hidden space-y-4">
        <div class="flex items-center gap-2 bg-white dark:bg-slate-800 p-2 rounded-2xl border border-slate-100 dark:border-slate-700 shadow-sm focus-within:border-blue-500 transition-colors">
            <span class="pl-3 opacity-50">🔍</span>
            <input type="text" id="library-search" oninput="renderVocabList()" placeholder="Tìm từ, nghĩa..." class="bg-transparent border-none outline-none text-sm p-2 w-full font-medium dark:text-white">
            <select id="library-filter" onchange="renderVocabList()" class="bg-slate-50 dark:bg-slate-900 border-none outline-none text-[10px] font-bold p-2 rounded-xl uppercase text-slate-500 cursor-pointer">
                <option value="all">Tất cả</option>
                <option value="v">Động từ (v)</option>
                <option value="n">Danh từ (n)</option>
                <option value="adj">Tính từ (adj)</option>
            </select>
        </div>
        <div id="vocab-container" class="grid grid-cols-1 md:grid-cols-2 gap-4 pb-10"></div>
    </div>

    <div id="flashcard-view" class="hidden space-y-6 animate-in fade-in zoom-in duration-300">
        <button onclick="closeFlashcards()" class="text-slate-400 font-bold text-[10px] uppercase flex items-center gap-2"><span>← Quay lại chủ đề</span></button>
        <div class="perspective-1000 w-full h-80 cursor-pointer" onclick="flipCard()">
            <div id="card-inner" class="relative w-full h-full transition-transform duration-500 preserve-3d shadow-xl rounded-[2.5rem]">
                <div class="absolute w-full h-full backface-hidden bg-white dark:bg-slate-800 rounded-[2.5rem] border-2 border-blue-50 dark:border-slate-700 flex flex-col items-center justify-center p-6 text-center">
                    <h3 id="card-front-word" class="text-4xl font-black text-slate-800 dark:text-white">---</h3>
                    <p id="card-front-ipa" class="text-blue-500 font-mono mt-2">/---/</p>
                </div>
                <div class="absolute w-full h-full backface-hidden bg-blue-600 rounded-[2.5rem] flex flex-col items-start justify-center p-8 text-white rotate-y-180 overflow-hidden">
    <div class="mb-4">
        <p id="card-back-mean" class="text-3xl font-black tracking-tight leading-tight">---</p>
        <p id="card-back-type-ipa" class="text-[10px] font-black uppercase opacity-70 tracking-widest mt-1">---</p>
    </div>

    <div class="space-y-4 w-full">
        <p id="card-back-example" class="bg-white/10 p-4 rounded-2xl text-sm italic w-full border border-white/10 leading-relaxed">"---"</p>
        
        <div class="grid grid-cols-2 gap-2 text-[10px] font-bold">
            <div class="bg-black/10 p-2 rounded-lg"><span class="opacity-50 uppercase block mb-1">Đồng nghĩa</span> <span id="card-back-synonyms">---</span></div>
            <div class="bg-black/10 p-2 rounded-lg"><span class="opacity-50 uppercase block mb-1">Trái nghĩa</span> <span id="card-back-antonyms">---</span></div>
        </div>

        <div id="card-back-note-box" class="bg-amber-400/20 p-3 rounded-xl border border-amber-400/30 hidden">
            <p class="text-[9px] font-black uppercase text-amber-300 mb-1">💡 Ghi nhớ</p>
            <p id="card-back-note" class="text-xs font-medium leading-snug"></p>
        </div>
    </div>
    
    <div class="absolute bottom-6 right-6 opacity-30 text-2xl">🔊</div>
</div>
            </div>
        </div>
        <div class="flex justify-between items-center gap-4">
            <button onclick="prevCard()" class="flex-1 p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl font-black text-slate-500">TRƯỚC</button>
            <div id="card-progress" class="text-[10px] font-black text-slate-400 uppercase">0 / 0</div>
            <button onclick="nextCard()" class="flex-1 p-4 bg-blue-600 rounded-2xl font-black text-white">SAU</button>
        </div>
    </div>
</section>

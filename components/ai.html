<section id="tab-ai-gen" class="tab-content hidden animate-in fade-in slide-in-from-bottom-4 pb-10">
    <div class="mb-6 flex items-center justify-between">
        <div>
            <h2 class="text-3xl font-black text-slate-800 dark:text-white tracking-tight">AI Lab ✨</h2>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Tạo từ vựng tự động với AI</p>
        </div>
        <a href="https://chatgpt.com" target="_blank" rel="noopener noreferrer" class="w-10 h-10 bg-white dark:bg-slate-800 rounded-2xl flex items-center justify-center text-blue-600 dark:text-blue-400 shadow-sm border border-slate-100 dark:border-slate-700 hover:shadow-md transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg>
        </a>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
        
        <div class="bg-white dark:bg-slate-800 p-6 rounded-[2rem] border border-slate-100 dark:border-slate-700 shadow-sm flex flex-col">
            <div class="flex items-center gap-3 mb-5">
                <div class="w-8 h-8 rounded-full bg-blue-100 dark:bg-blue-900/50 text-blue-600 dark:text-blue-400 flex items-center justify-center font-black text-sm">1</div>
                <h3 class="text-sm font-black text-slate-800 dark:text-white uppercase tracking-widest">Cấu hình & Copy Prompt</h3>
            </div>

            <div class="space-y-4 flex-1">
                <div class="space-y-1.5">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest pl-1">Chủ đề từ vựng</label>
                    <div class="relative focus-within:ring-4 focus-within:ring-blue-500/10 rounded-xl transition-all">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400">🎯</span>
                        <input type="text" id="user-topic" placeholder="VD: Công nghệ, IELTS, Du lịch..."
                            class="w-full pl-10 pr-4 py-3.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl font-bold text-slate-700 dark:text-white outline-none focus:border-blue-500 transition-colors placeholder:text-slate-400 text-sm">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest pl-1">Độ khó</label>
                        <select id="user-level" class="w-full p-3.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-xs font-bold text-slate-700 dark:text-white outline-none focus:border-blue-500 transition-all cursor-pointer">
                            <option value="A1-A2">🌱 Cơ bản</option>
                            <option value="B1-B2" selected>🚀 Trung cấp</option>
                            <option value="C1-C2">🔥 Cao cấp</option>
                        </select>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest pl-1">Số lượng</label>
                        <select id="user-count" class="w-full p-3.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-xs font-bold text-slate-700 dark:text-white outline-none focus:border-blue-500 transition-all cursor-pointer">
                            <option value="5">5 từ</option>
                            <option value="10" selected>10 từ</option>
                            <option value="20">20 từ</option>
                        </select>
                    </div>
                </div>
            </div>

            <button onclick="copyDynamicPrompt()" class="mt-5 w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-black shadow-md hover:shadow-lg transition-all uppercase text-xs tracking-widest flex items-center justify-center gap-2 active:scale-[0.98]">
                📋 Copy Prompt Mẫu
            </button>
        </div>

        <div class="bg-white dark:bg-slate-800 p-6 rounded-[2rem] border border-slate-100 dark:border-slate-700 shadow-sm flex flex-col">
            <div class="flex items-center gap-3 mb-5">
                <div class="w-8 h-8 rounded-full bg-emerald-100 dark:bg-emerald-900/50 text-emerald-600 dark:text-emerald-400 flex items-center justify-center font-black text-sm">2</div>
                <h3 class="text-sm font-black text-slate-800 dark:text-white uppercase tracking-widest">Nạp kết quả từ AI</h3>
            </div>

            <div class="flex-1 focus-within:ring-4 focus-within:ring-emerald-500/10 rounded-xl transition-all min-h-[160px]">
                <textarea id="ai-input" placeholder="Dán đoạn mã JSON AI trả về vào đây (bắt đầu bằng [ và kết thúc bằng ])..."
                    class="w-full h-full p-4 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl font-mono text-[11px] text-slate-700 dark:text-slate-300 outline-none focus:border-emerald-500 transition-colors placeholder:text-slate-400 resize-none leading-relaxed"></textarea>
            </div>

            <button onclick="processVocab()" class="mt-5 w-full bg-emerald-500 hover:bg-emerald-600 text-white py-4 rounded-xl font-black shadow-md hover:shadow-lg transition-all uppercase text-xs tracking-widest flex items-center justify-center gap-2 active:scale-[0.98]">
                📥 Lưu vào thư viện
            </button>
        </div>
    </div>
</section>

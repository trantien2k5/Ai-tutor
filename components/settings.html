<section id="tab-settings" class="tab-content hidden">
    <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-black text-slate-800 dark:text-white">Cài đặt hệ thống ⚙️</h2>
    </div>

    <div class="space-y-6">
        <div
            class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-100 dark:border-slate-700 shadow-sm p-4 space-y-4">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Trải nghiệm người dùng
            </p>

            <div class="flex items-center justify-between">
                <span class="text-sm font-bold text-slate-700 dark:text-slate-200">Chế độ tối (Dark Mode)</span>
                <button onclick="toggleDarkMode()" id="dark-mode-btn"
                    class="w-12 h-6 bg-slate-200 dark:bg-blue-600 rounded-full relative transition-colors">
                    <div class="absolute top-1 left-1 dark:left-7 w-4 h-4 bg-white rounded-full transition-all">
                    </div>
                </button>
            </div>

            <div class="flex items-center justify-between">
                <span class="text-sm font-bold text-slate-700 dark:text-slate-200">Tự động phát âm
                    (Auto-Play)</span>
                <input type="checkbox" id="setting-auto-speak" onchange="saveSettings()"
                    class="w-5 h-5 accent-blue-600">
            </div>
        </div>

        <div
            class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-100 dark:border-slate-700 shadow-sm p-4 space-y-4">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Cấu hình học tập</p>
            <div class="space-y-3">
                <select id="setting-voice" onchange="saveSettings()"
                    class="w-full p-3 bg-slate-50 dark:bg-slate-900 dark:text-white border border-slate-200 dark:border-slate-700 rounded-xl text-xs font-medium"></select>
                <div class="flex items-center justify-between">
                    <span class="text-sm font-bold text-slate-700 dark:text-slate-200">Mục tiêu/ngày</span>
                    <input type="number" id="setting-goal" onchange="saveSettings()"
                        class="w-16 p-2 bg-slate-50 dark:bg-slate-900 dark:text-white border border-slate-200 dark:border-slate-700 rounded-lg text-center font-bold text-blue-600">
                </div>
            </div>
        </div>

        <div
            class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-100 dark:border-slate-700 shadow-sm p-4 space-y-4">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Quản lý dữ liệu</p>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="exportData()"
                    class="p-3 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-xl font-black text-[10px] uppercase border border-blue-100 dark:border-blue-800">Xuất
                    dữ liệu</button>
                <label
                    class="p-3 bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 rounded-xl font-black text-[10px] uppercase border border-emerald-100 dark:border-emerald-800 text-center cursor-pointer">
                    Nhập dữ liệu <input type="file" class="hidden" onchange="importData(event)">
                </label>
            </div>
            <button onclick="resetQuizStats()"
                class="w-full p-3 bg-orange-50 dark:bg-orange-900/20 text-orange-600 dark:text-orange-400 font-bold rounded-xl text-xs">Xóa
                lịch sử thi (Reset Score)</button>
            <button onclick="clearAllData()"
                class="w-full p-3 bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 font-bold rounded-xl text-xs">Xóa
                sạch toàn bộ từ vựng</button>
        </div>
    </div>
</section>

<section id="tab-settings" class="tab-content hidden animate-in fade-in slide-in-from-bottom-4 pb-10">
    <div class="mb-8">
        <h2 class="text-3xl font-black text-slate-800 dark:text-white tracking-tight">Cài đặt ⚙️</h2>
        <p class="text-[10px] font-bold text-slate-400 uppercase mt-1 tracking-widest">Tùy chỉnh trải nghiệm học tập</p>
    </div>

    <div class="space-y-6">
        <div class="bg-white dark:bg-slate-800 p-6 rounded-[2rem] border border-slate-100 dark:border-slate-700 shadow-sm">
            <h3 class="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-6 flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-blue-500"></span> Trải nghiệm người dùng
            </h3>

            <div class="space-y-6">
                <div class="flex items-center justify-between">
                    <div>
                        <span class="text-sm font-bold text-slate-700 dark:text-slate-200 block">Chế độ tối</span>
                        <span class="text-[10px] text-slate-400 font-medium">Giảm mỏi mắt khi học ban đêm</span>
                    </div>
                    <button onclick="toggleDarkMode()" aria-label="Toggle Dark Mode"
                        class="w-14 h-8 bg-slate-200 dark:bg-blue-600 rounded-full relative transition-colors duration-300 focus:outline-none focus:ring-4 focus:ring-blue-500/20">
                        <div id="dark-mode-toggle-thumb" class="absolute top-1 left-1 w-6 h-6 bg-white rounded-full transition-transform duration-300 shadow-md flex items-center justify-center">
                            <span class="text-[10px] dark:hidden">☀️</span>
                            <span class="text-[10px] hidden dark:block">🌙</span>
                        </div>
                    </button>
                </div>

                <div class="h-px bg-slate-100 dark:bg-slate-700/50"></div>

                <div class="flex items-center justify-between">
                    <div>
                        <span class="text-sm font-bold text-slate-700 dark:text-slate-200 block">Tự động phát âm</span>
                        <span class="text-[10px] text-slate-400 font-medium">Đọc từ vựng khi lật thẻ flashcard</span>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="setting-auto-speak" onchange="saveSettings()" class="sr-only peer">
                        <div class="w-14 h-8 bg-slate-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-500/20 rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all dark:border-slate-600 peer-checked:bg-blue-600"></div>
                    </label>
                </div>
            </div>
        </div>

        <div class="bg-white dark:bg-slate-800 p-6 rounded-[2rem] border border-slate-100 dark:border-slate-700 shadow-sm">
            <h3 class="text-[10px] font-black text-emerald-500 uppercase tracking-widest mb-6 flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-emerald-500"></span> Cấu hình hệ thống
            </h3>
            
            <div class="space-y-5">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest pl-1">Giọng đọc (TTS Voice)</label>
                    <select id="setting-voice" onchange="saveSettings()"
                        class="w-full p-4 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl text-xs font-bold text-slate-700 dark:text-white outline-none focus:border-blue-500 transition-colors cursor-pointer"></select>
                </div>
                
                <div class="flex items-center justify-between p-4 bg-slate-50 dark:bg-slate-900 rounded-2xl border border-slate-100 dark:border-slate-700/50">
                    <div>
                        <span class="text-sm font-bold text-slate-700 dark:text-slate-200 block">Mục tiêu từ vựng</span>
                        <span class="text-[10px] text-slate-400">Số từ cần học mỗi ngày</span>
                    </div>
                    <input type="number" id="setting-goal" onchange="saveSettings()" min="1" max="100"
                        class="w-20 p-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600 rounded-xl text-center font-black text-blue-600 outline-none focus:border-blue-500 transition-colors">
                </div>
            </div>
        </div>

        <div class="bg-white dark:bg-slate-800 p-6 rounded-[2rem] border border-slate-100 dark:border-slate-700 shadow-sm">
            <h3 class="text-[10px] font-black text-amber-500 uppercase tracking-widest mb-6 flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-amber-500"></span> Quản lý dữ liệu
            </h3>
            
            <div class="grid grid-cols-2 gap-3 mb-4">
                <button onclick="exportData()"
                    class="p-4 bg-slate-50 hover:bg-slate-100 dark:bg-slate-900 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-200 rounded-2xl font-black text-[10px] uppercase border border-slate-200 dark:border-slate-700 transition-colors flex flex-col items-center gap-2">
                    <span class="text-xl">📤</span> Xuất dữ liệu
                </button>
                <label
                    class="p-4 bg-slate-50 hover:bg-slate-100 dark:bg-slate-900 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-200 rounded-2xl font-black text-[10px] uppercase border border-slate-200 dark:border-slate-700 transition-colors flex flex-col items-center gap-2 cursor-pointer">
                    <span class="text-xl">📥</span> Nhập dữ liệu
                    <input type="file" class="hidden" accept=".json" onchange="importData(event)">
                </label>
            </div>
            
            <div class="space-y-3 pt-2 border-t border-slate-100 dark:border-slate-700/50">
                <button onclick="resetQuizStats()"
                    class="w-full p-4 bg-orange-50 hover:bg-orange-100 dark:bg-orange-900/20 dark:hover:bg-orange-900/40 text-orange-600 dark:text-orange-400 font-black rounded-2xl text-[11px] uppercase tracking-widest transition-colors flex justify-center items-center gap-2">
                    <span>Xóa lịch sử thi</span>
                </button>
                <button onclick="clearAllData()"
                    class="w-full p-4 bg-red-50 hover:bg-red-100 dark:bg-red-900/20 dark:hover:bg-red-900/40 text-red-600 dark:text-red-400 font-black rounded-2xl text-[11px] uppercase tracking-widest transition-colors flex justify-center items-center gap-2">
                    <span>⚠️ Xóa sạch thư viện</span>
                </button>
            </div>
        </div>
    </div>
</section>

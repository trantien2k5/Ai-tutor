<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vocab Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-slate-50 dark:bg-slate-950 font-sans text-slate-900 md:flex md:min-h-screen">

    <aside
        class="hidden md:flex flex-col w-72 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 h-screen sticky top-0 p-6 z-50">
        <div class="flex items-center gap-3 mb-10 px-2">
            <div
                class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-xl shadow-lg shadow-blue-200 dark:shadow-none">
                ✨</div>
            <h1 class="text-xl font-black text-slate-800 dark:text-white tracking-tight">AI Vocab</h1>
        </div>

        <div class="space-y-2 flex-1">
            <button onclick="switchTab('home')"
                class="tab-btn w-full flex items-center gap-4 p-4 rounded-2xl text-slate-400 font-bold hover:bg-slate-50 dark:hover:bg-slate-800 transition-all"
                data-tab="home">
                <span class="text-xl">🏠</span><span>Trang chủ</span>
            </button>
            <button onclick="switchTab('library')"
                class="tab-btn w-full flex items-center gap-4 p-4 rounded-2xl text-slate-400 font-bold hover:bg-slate-50 dark:hover:bg-slate-800 transition-all"
                data-tab="library">
                <span class="text-xl">📚</span><span>Thư viện</span>
            </button>
            <button onclick="switchTab('ai-gen')"
                class="tab-btn w-full flex items-center gap-4 p-4 rounded-2xl text-slate-400 font-bold hover:bg-slate-50 dark:hover:bg-slate-800 transition-all"
                data-tab="ai-gen">
                <span class="text-xl">✨</span><span>AI Thêm Từ</span>
            </button>
            <button onclick="switchTab('practice')"
                class="tab-btn w-full flex items-center gap-4 p-4 rounded-2xl text-slate-400 font-bold hover:bg-slate-50 dark:hover:bg-slate-800 transition-all"
                data-tab="practice">
                <span class="text-xl">📝</span><span>Luyện tập</span>
            </button>
        </div>

        <button onclick="switchTab('settings')"
            class="tab-btn w-full flex items-center gap-4 p-4 rounded-2xl text-slate-400 font-bold hover:bg-slate-50 dark:hover:bg-slate-800 transition-all"
            data-tab="settings">
            <span class="text-xl">⚙️</span><span>Cài đặt</span>
        </button>
    </aside>

    <div class="flex-1 flex flex-col min-w-0">
        <main id="app-content" class="max-w-5xl mx-auto w-full p-4 md:p-10 pb-24 md:pb-10">
            <div id="tab-home" class="tab-content"></div>
            <div id="tab-library" class="tab-content"></div>
            <div id="tab-ai-gen" class="tab-content"></div>
            <div id="tab-practice" class="tab-content"></div>
            <div id="tab-settings" class="tab-content"></div>
        </main>
    </div>

    <nav
        class="md:hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 px-2 pb-safe shadow-lg z-50">
        <div class="max-w-md mx-auto flex justify-between items-center h-16">
            <button onclick="switchTab('home')" class="tab-btn flex flex-col items-center flex-1 text-slate-400"
                data-tab="home">
                <span class="text-lg">🏠</span><span class="text-[9px] font-bold">Trang chủ</span>
            </button>
            <button onclick="switchTab('library')" class="tab-btn flex flex-col items-center flex-1 text-slate-400"
                data-tab="library">
                <span class="text-lg">📚</span><span class="text-[9px] font-bold">Thư viện</span>
            </button>
            <button onclick="switchTab('ai-gen')" class="tab-btn flex flex-col items-center flex-1 -mt-8"
                data-tab="ai-gen">
                <div
                    class="bg-blue-600 text-white p-4 rounded-full shadow-lg border-4 border-white dark:border-slate-900 active:scale-95 transition-transform">
                    <span>✨</span>
                </div>
            </button>
            <button onclick="switchTab('practice')" class="tab-btn flex flex-col items-center flex-1 text-slate-400"
                data-tab="practice">
                <span class="text-lg">📝</span><span class="text-[9px] font-bold">Luyện tập</span>
            </button>
            <button onclick="switchTab('settings')" class="tab-btn flex flex-col items-center flex-1 text-slate-400"
                data-tab="settings">
                <span class="text-lg">⚙️</span><span class="text-[9px] font-bold">Cài đặt</span>
            </button>
        </div>
    </nav>

    <div id="toast-container" class="fixed top-6 left-1/2 -translate-x-1/2 z-[100] space-y-3 pointer-events-none"></div>

    <div id="flashcard-view"
        class="hidden fixed inset-0 bg-slate-100 dark:bg-slate-950 z-[999] flex flex-col items-center justify-center p-4 md:p-6 overflow-y-auto shadow-2xl">
        <div class="w-full max-w-md flex flex-col items-center">
            <div class="w-full flex items-center justify-between mb-6">
                <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest">Ai Tutor Mode</h2>
                <div class="flex items-center gap-3">
                    <span id="card-progress" class="text-[10px] font-bold text-slate-500">0 / 0</span>
                    <button onclick="closeFlashcards()"
                        class="w-8 h-8 flex items-center justify-center bg-slate-800 rounded-full text-white hover:bg-red-500 transition-colors">✕</button>
                </div>
            </div>

            <div class="w-full h-1 bg-slate-800 rounded-full mb-8 overflow-hidden">
                <div id="card-progress-bar" class="h-full bg-blue-500 transition-all duration-300 w-0"></div>
            </div>

            <div class="w-full flashcard-container aspect-[3/4] min-h-[420px]">
                <div id="card-inner" onclick="flipCard()"
                    class="flashcard-inner relative w-full h-full cursor-pointer preserve-3d">
                    <div
                        class="flashcard-front bg-white absolute w-full h-full backface-hidden rounded-[2.5rem] p-8 flex flex-col justify-between shadow-2xl">
                        <div class="w-full">
                            <p id="card-front-word"
                                class="text-4xl font-extrabold text-slate-800 tracking-tighter mb-2">---</p>
                            <div class="flex items-center gap-2">
                                <span id="card-front-ipa" class="text-xs font-bold text-slate-400">/---/</span>
                                <span id="card-front-type"
                                    class="text-[9px] font-black uppercase text-slate-500 bg-slate-100 px-2 py-0.5 rounded">---</span>
                            </div>
                        </div>
                        <p class="text-[10px] font-bold text-slate-300 uppercase tracking-widest">Chạm để xem nghĩa →
                        </p>
                    </div>
                    <div id="card-back" style="background-color: #2563eb;"
                        class="flashcard-back absolute w-full h-full backface-hidden bg-blue-600 rounded-[2.5rem] flex flex-col items-start justify-center p-8 text-white rotate-y-180 shadow-2xl">
                        <div class="mb-6 w-full">
                            <p id="card-back-mean" class="text-3xl font-black leading-tight">---</p>
                            <p id="card-back-type-ipa" class="text-[10px] font-black uppercase opacity-60 mt-1">---</p>
                        </div>
                        <div class="space-y-4 w-full">
                            <p id="card-back-example"
                                class="bg-white/10 p-4 rounded-2xl text-sm italic border border-white/5 leading-relaxed">
                                ---</p>
                            <div class="grid grid-cols-2 gap-2 text-[10px] font-bold">
                                <div class="bg-black/10 p-2 rounded-lg"><span
                                        class="opacity-50 uppercase block mb-1">Đồng nghĩa</span> <span
                                        id="card-back-synonyms">---</span></div>
                                <div class="bg-black/10 p-2 rounded-lg"><span
                                        class="opacity-50 uppercase block mb-1">Trái nghĩa</span> <span
                                        id="card-back-antonyms">---</span></div>
                            </div>
                            <div id="card-back-note-box"
                                class="bg-amber-400/20 p-3 rounded-xl border border-amber-400/20 hidden">
                                <p id="card-back-note" class="text-[11px] font-medium"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="w-full flex flex-col gap-4 mt-8">
                <button id="next-card-btn" onclick="nextCard()"
                    class="w-full bg-white text-blue-600 font-black uppercase text-xs py-4 rounded-2xl shadow-xl active:scale-95 transition-all">Next
                    Card →</button>
                <div class="flex justify-center gap-8">
                    <button onclick="prevCard()"
                        class="text-slate-500 hover:text-white font-bold text-xs uppercase tracking-widest transition-colors">←
                        Prev</button>
                    <button onclick="speak(currentSessionWords[currentCardIndex].word)"
                        class="text-slate-500 hover:text-white font-bold text-xs uppercase tracking-widest transition-colors">Audio
                        🔊</button>
                </div>
            </div>
        </div>
    </div>
    <script src="js/state.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/home.js"></script>
    <script src="js/library.js"></script>
    <script src="js/flashcard.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/practice.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
</body>

</html>

<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vocab Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
</head>

<body class="bg-slate-50 dark:bg-slate-950 font-sans text-slate-900 md:flex md:min-h-screen">

    <aside class="hidden md:flex flex-col w-72 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 h-screen sticky top-0 p-6 z-50">
    <div class="flex items-center gap-3 mb-10 px-2">
        <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-xl shadow-lg shadow-blue-200 dark:shadow-none" aria-hidden="true">✨</div>
        <h1 class="text-xl font-black text-slate-800 dark:text-white tracking-tight">AI Vocab</h1>
    </div>

    <nav aria-label="Main Navigation" class="flex-1 w-full">
        <ul class="space-y-2">
            <li>
                <button data-action="switch-tab" data-payload="home" aria-label="Mở trang chủ" class="tab-btn w-full flex items-center gap-4 p-4 rounded-2xl text-slate-400 font-bold hover:bg-slate-50 dark:hover:bg-slate-800 transition-all" data-tab="home">
                    <span class="text-xl" aria-hidden="true">🏠</span><span>Trang chủ</span>
                </button>
            </li>
            <li>
                <button data-action="switch-tab" data-payload="library" aria-label="Mở thư viện từ vựng" class="tab-btn w-full flex items-center gap-4 p-4 rounded-2xl text-slate-400 font-bold hover:bg-slate-50 dark:hover:bg-slate-800 transition-all" data-tab="library">
                    <span class="text-xl" aria-hidden="true">📚</span><span>Thư viện</span>
                </button>
            </li>
            <li>
                <button data-action="switch-tab" data-payload="ai-gen" aria-label="Mở công cụ AI thêm từ" class="tab-btn w-full flex items-center gap-4 p-4 rounded-2xl text-slate-400 font-bold hover:bg-slate-50 dark:hover:bg-slate-800 transition-all" data-tab="ai-gen">
                    <span class="text-xl" aria-hidden="true">✨</span><span>AI Thêm Từ</span>
                </button>
            </li>
            <li>
                <button data-action="switch-tab" data-payload="practice" aria-label="Mở phần luyện tập" class="tab-btn w-full flex items-center gap-4 p-4 rounded-2xl text-slate-400 font-bold hover:bg-slate-50 dark:hover:bg-slate-800 transition-all" data-tab="practice">
                    <span class="text-xl" aria-hidden="true">📝</span><span>Luyện tập</span>
                </button>
            </li>
        </ul>
    </nav>

    <nav aria-label="Settings Navigation" class="w-full mt-auto">
        <button data-action="switch-tab" data-payload="settings" aria-label="Mở cài đặt hệ thống" class="tab-btn w-full flex items-center gap-4 p-4 rounded-2xl text-slate-400 font-bold hover:bg-slate-50 dark:hover:bg-slate-800 transition-all" data-tab="settings">
            <span class="text-xl" aria-hidden="true">⚙️</span><span>Cài đặt</span>
        </button>
    </nav>
</aside>

    <div class="flex-1 flex flex-col min-w-0">
        <main id="app-content" class="max-w-5xl mx-auto w-full p-4 md:p-10 pb-24 md:pb-10">
            <div id="tab-home" class="tab-content"></div>
            <div id="tab-library" class="tab-content"></div>
            <div id="tab-ai-gen" class="tab-content"></div>
            <div id="tab-practice" class="tab-content"></div>
            <div id="tab-settings" class="tab-content"></div>
        </main>
    </div>

    <nav aria-label="Mobile Navigation" class="md:hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 px-2 pb-safe shadow-lg z-50">
    <ul class="max-w-md mx-auto flex justify-between items-center h-16">
        <li class="flex-1 flex justify-center">
            <button data-action="switch-tab" data-payload="home" aria-label="Mở trang chủ" class="tab-btn flex flex-col items-center w-full text-slate-400" data-tab="home">
                <span class="text-lg" aria-hidden="true">🏠</span><span class="text-[9px] font-bold">Trang chủ</span>
            </button>
        </li>
        <li class="flex-1 flex justify-center">
            <button data-action="switch-tab" data-payload="library" aria-label="Mở thư viện từ vựng" class="tab-btn flex flex-col items-center w-full text-slate-400" data-tab="library">
                <span class="text-lg" aria-hidden="true">📚</span><span class="text-[9px] font-bold">Thư viện</span>
            </button>
        </li>
        <li class="flex-1 flex justify-center -mt-8">
            <button data-action="switch-tab" data-payload="ai-gen" aria-label="Tạo từ vựng mới bằng AI" class="tab-btn flex flex-col items-center w-full" data-tab="ai-gen">
                <div class="bg-blue-600 text-white w-14 h-14 rounded-full shadow-lg border-4 border-white dark:border-slate-900 active:scale-95 transition-transform flex items-center justify-center">
                    <span class="text-xl leading-none" aria-hidden="true">✨</span>
                </div>
            </button>
        </li>
        <li class="flex-1 flex justify-center">
            <button data-action="switch-tab" data-payload="practice" aria-label="Mở phần luyện tập" class="tab-btn flex flex-col items-center w-full text-slate-400" data-tab="practice">
                <span class="text-lg" aria-hidden="true">📝</span><span class="text-[9px] font-bold">Luyện tập</span>
            </button>
        </li>
        <li class="flex-1 flex justify-center">
            <button data-action="switch-tab" data-payload="settings" aria-label="Mở cài đặt" class="tab-btn flex flex-col items-center w-full text-slate-400" data-tab="settings">
                <span class="text-lg" aria-hidden="true">⚙️</span><span class="text-[9px] font-bold">Cài đặt</span>
            </button>
        </li>
    </ul>
</nav>

    <div id="toast-container" class="fixed top-6 left-1/2 -translate-x-1/2 z-[100] space-y-3 pointer-events-none"></div>

    <div id="flashcard-wrapper"></div>

    <script type="module" src="js/main.js"></script>
</body>

</html>
